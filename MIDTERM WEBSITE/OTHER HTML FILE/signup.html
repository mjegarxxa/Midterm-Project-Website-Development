<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="OTHER CSS FILE/signup.css">
</head>
<body>
    <div class="wrapper">
        <form action="">
            <h1>Sign Up</h1>
            <div class="input-box">
                <input type="text" placeholder="Username">
            </div>
            <div class="input-box">
                <input type="email" placeholder="E-mail">
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password">
            </div>
            <div class="input-box">
                <input type="password" placeholder="Confirm Password">
            </div>
            <button type="submit" class="btn">Sign Up</button>
            <div class="register-link">
                <p>Already have an account? <a href="OTHER HTML FILE/signup-signin.html">Sign In</a></p>
            </div>
        </form>
    </div>
</body>
