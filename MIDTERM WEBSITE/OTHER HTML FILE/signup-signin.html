<!DOCTYPE html>
<html>
<head>
    <title>Sign In</title>
    <link rel="stylesheet" href="OTHER CSS FILE/signin.css">
</head>
<body>
    <div class="wrapper">
        <form action="">
            <h1>Sign In</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox">Remember me</label>
                <a href="#">Forgot password?</a>
            </div>
            <button type="submit" class="btn">Sign In</button>
            <div class="register-link">
                <p>Don't have an account? <a href="OTHER HTML FILE/signup.html">Register</a></p>
            </div>
        </form>
    </div>
</body>
