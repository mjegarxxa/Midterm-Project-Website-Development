<!DOCTYPE html>
<html>
    <head>
        <title>Shopping Cart</title>
        <link rel="stylesheet" href="shop-cart.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>
       <div class="header">
         <p class="name">Shopping Cart</p>
         <div class="cart"><i class="fa-solid fa-shopping-cart"></i><p id="count">0</p></div>
       </div>
       <div class="container">
        <div id="root"></div>
        <div class="sidebar">
            <div class="head"><p>My Cart</p></div>
            <div id="cartItem">Your cart is empty!</div>
            <div class="foot">
                <h3>TOTAL: </h3>
                <h2 id="total">P 0.00</h2>
            </div>
            <a href="payment.html">CHECKOUT</a>
        </div>
       </div>
        <script src="shop-cart.js"></script>
    </body>

</html>
